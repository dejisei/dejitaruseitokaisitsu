<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>デジタル生徒会室＿メニュー</title>
    <style>
        body{
            background-color: #FFFDD0;
        }
        footer{
            height: 20vh;
        }
        main{
            /* background-image: url(bunbougu_kokuban.png);
            background-size: contain; */
            background-color: rgb(0, 50, 0);
            height: 60vh;
            padding-top: 5vh;
            padding-bottom: 5vh;
        }
        main>h1{
            margin-bottom: 0;
            margin-top: 0;
            /* padding: 20px; */
        }
        .grid{
            height: 60vh;
            width: 80vw;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(2,auto);
            gap: 10px;
            width: auto;
            grid-template-areas: 
            "form archive"
            "form archive";
        }
        .grid>div{
            border: solid 3px gray;
            border-radius: 5%;
        }
        .form{
            grid-area: form;
            background-color: rgb(224, 48, 90);
        }
        .archive{
            grid-area: archive;
            background-color:  rgb(0, 128, 111);
        }
        .folder{
            grid-area: folder;
            background-color: rgb(255, 196, 0)
        }
        aside{
            height: 8vh;
            background-color: chocolate;
            margin: 0;
        }
        .suggest-box{
            background-color:rgb(224, 48, 90); ;
            width: 30vh; height: 40vh;
            object-fit: contain;
        }
        .commmingsoon{
            background-color:gray !important ;
        }
         /* 時計の見た目だけHTML側で調整 */
         .footer {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 10px 20px;
            }

            .footer-left {
            justify-self: start;
            }

            .footer-center {
            justify-self: center;
            }

            .footer-right {
            justify-self: end;
            }

            #clockCanvas {
            background: white;
            border-radius: 50%;
            }
            #newsTicker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: chocolate;
            color: #fff;
            overflow: hidden;
            white-space: nowrap;
            font-size: 14px;
            padding: 6px 0;
            z-index: 1000;
            }

            #newsTickerInner {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
            }

            @keyframes ticker {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(-100%);
            }
            }

    </style>
</head>
<body>
    <footer class="footer">
        <div class="footer-left">
           <h1>デジタル生徒会室</h1>
        </div>

        <div class="footer-center">
            <canvas id="clockCanvas" width="100" height="100"></canvas>
        </div>

        <div class="footer-right">
            <!-- バランス用（何も入れなくてOK） -->
        </div>
    </footer>
    <main>
        <div class="grid">
            <div class="form">
                <a href="https://dejisei.github.io/opinion-box/"></a>
                    <h1>デジタル意見箱</h1>
                    <img src="guggest-box.png" alt="意見箱のイラスト（未定）" class="suggest-box">
                </a>
            </div>
            
            
            <div class="archive commingsoon">
                <h1>プリントアーカイブ</h1>
            </div>
            <!-- <div class="folder commingsoon">
                <h1>共有フォルダー</h1>
            </div> -->
            <!-- ↑公開の見込みなし -->
        </div>
        
    </main>
    <!-- ニュース流れるバー -->
    <div id="newsTicker">
    <div id="newsTickerInner"></div>
    </div>

    <script src="news-ticker.js"></script>
    <script src="clock.js"></script>
</body>
</html>
